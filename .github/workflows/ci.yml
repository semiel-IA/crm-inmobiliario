name: CI

# Typecheck + lint + unit tests on every push/PR to main. Deliberately does NOT run
# `npm run test:rls` or `npm run test:e2e`: both suites hit a real Supabase project (DATABASE_URL,
# SUPABASE_SERVICE_ROLE_KEY, NEXT_PUBLIC_SUPABASE_URL/ANON_KEY) and there is no CI secrets setup
# yet — no GitHub remote exists either (T0.5, $0-rule checkpoint: adding secrets/a remote needs
# explicit user approval first). `npm test` (Vitest, tests/unit/**) needs no network access and is
# safe to run here as-is.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `next-env.d.ts` is gitignored (Next.js convention) but `tsc --noEmit` needs it for the
      # ambient CSS/route type declarations — on a fresh checkout it doesn't exist, so generate it.
      - name: Generate Next.js types
        run: npx next typegen

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test
